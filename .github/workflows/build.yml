name: Build and Release
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: tag
        required: false
        default: continuous-build
jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            artifact_name: bRAC-windows-gnu-amd64
          - target: x86_64-unknown-linux-gnu
            artifact_name: bRAC-linux-gnu-amd64
          - target: x86_64-unknown-linux-musl
            artifact_name: bRAC-linux-musl-amd64
          - target: aarch64-unknown-linux-gnu
            artifact_name: bRAC-linux-gnu-arm64
          - target: aarch64-unknown-linux-musl
            artifact_name: bRAC-linux-musl-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Sysroots and GTK4
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/deb http/deb [arch=amd64] http/g' /etc/apt/sources.list.d/* /etc/apt/sources.list || true
          sudo sed -i 's/deb https/deb [arch=amd64] https/g' /etc/apt/sources.list.d/* /etc/apt/sources.list || true
          echo "deb [arch=arm64] http://ubuntu.com noble main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ubuntu.com noble-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ubuntu.com noble-security main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev build-essential pkg-config wget unzip curl mingw-w64 musl-tools
          sudo apt-get install -y libgtk-4-dev:arm64 libglib2.0-dev:arm64

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Configure Environment Variables
        run: |
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV
            echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          fi

          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            echo "CC_aarch64_unknown_linux_musl=musl-gcc" >> $GITHUB_ENV
            echo "CXX_aarch64_unknown_linux_musl=musl-g++" >> $GITHUB_ENV
          fi

      - name: Build Windows
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          export PKG_CONFIG_ALL_STATIC=1
          make windows

      - name: Build Linux x86_64 GNU
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build -r --target ${{ matrix.target }}

      - name: Build Linux x86_64 MUSL
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: cargo build -r --target ${{ matrix.target }}
        
      - name: Build Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo build -r --target ${{ matrix.target }}

      - name: Prepare Linux Assets
        if: matrix.target != 'x86_64-pc-windows-gnu'
        run: |
          mkdir -p build/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/bRAC build/${{ matrix.target }}/
          cp ru.themixray.bRAC.png build/${{ matrix.target }}/
          cp ru.themixray.bRAC.desktop build/${{ matrix.target }}/
          cp install.sh build/${{ matrix.target }}/
          cp uninstall.sh build/${{ matrix.target }}/

      - name: Archive production artifacts
        run: |
          cd build/${{ matrix.target }}
          zip -r ../../${{ matrix.artifact_name }}.zip .
          cd ../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    if: github.event.inputs.version_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Move artifacts to root
        run: |
          mv artifacts/*/*.zip .
          ls -la
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version_tag }}
          name: Release ${{ github.event.inputs.version_tag }}
          draft: false
          prerelease: false
          files: |
            bRAC-windows-gnu-amd64.zip
            bRAC-linux-gnu-amd64.zip
            bRAC-linux-musl-amd64.zip
            bRAC-linux-gnu-arm64.zip
            bRAC-linux-musl-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
